<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Password Generator</h1>
        <div class="password-display">
            <input type="text" id="password-output" readonly placeholder="Your password will appear here">
        </div>
        <div class="controls">
            <div class="slider-container">
                <label for="length-slider">Length: <span id="length-value">12</span></label>
                <input type="range" id="length-slider" min="4" max="20" value="12">
            </div>
            <div class="options">
                <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
                <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
                <label><input type="checkbox" id="numbers" checked> Numbers</label>
                <label><input type="checkbox" id="symbols" checked> Symbols</label>
            </div>
            <div class="button-group">
                <button id="generate-btn">Generate</button>
                <button id="copy-btn">Copy</button>
            </div>
        </div>
        <div class="strength-indicator">
            Strength: <span id="strength">Strong</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
